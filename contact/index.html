<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact TagLogger</title>
    <meta name="description" content="Contact TagLogger for sales, onboarding, and platform questions." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://taglogger.com/contact/" />
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --accent: #1d4ed8;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 42px 20px 64px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 30px;
      }

      h1 {
        margin: 0 0 10px;
        line-height: 1.2;
      }

      p {
        color: var(--muted);
        margin: 10px 0;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 600;
      }

      .btn-primary {
        background: var(--accent);
        border: 1px solid var(--accent);
        color: #ffffff;
      }

      .btn-ghost {
        border: 1px solid rgba(29, 78, 216, 0.24);
        background: rgba(29, 78, 216, 0.06);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" aria-labelledby="contact-title">
        <h1 id="contact-title">Contact TagLogger</h1>
        <p>Our contact and demo request form is part of the main landing page under the <strong>Get in Touch</strong> section.</p>
        <p>Use the button below to jump directly to that section and submit your request.</p>

        <div class="actions">
          <a class="btn btn-primary" href="/#get-in-touch">Open Get in Touch Form</a>
          <a class="btn btn-ghost" href="/">Back to Home</a>
          <a class="btn btn-ghost" href="/privacy/">Privacy Policy</a>
        </div>
      </section>
    </main>
  </body>
</html>
